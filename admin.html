<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotusTV - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased min-h-screen">

    <div id="login-container" class="hidden flex items-center justify-center min-h-screen">
        <div class="w-full max-w-md p-8 space-y-6 bg-white shadow-xl rounded-xl">
            <h2 class="text-3xl font-bold text-center text-gray-900">⚡ NotusTV - Admin</h2>
            <form id="login-form" class="space-y-6">
                <div id="login-error" class="hidden p-4 bg-red-100 text-red-700 rounded-lg text-sm"></div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 mt-1 border rounded-lg focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Senha</label>
                    <input type="password" id="password" required class="w-full px-4 py-2 mt-1 border rounded-lg focus:ring-indigo-500">
                </div>
                <button type="submit" class="w-full py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Entrar</button>
            </form>
        </div>
    </div>

    <div id="main-container" class="hidden max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900">👤 Dashboard NotusTV</h1>
            <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">Sair</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-lg mb-6 flex flex-wrap gap-4 items-center justify-between">
            <input type="text" id="search" placeholder="Buscar..." class="px-4 py-2 border rounded-lg w-full md:w-1/3">
            <select id="filter-dep" class="px-4 py-2 border rounded-lg">
                <option value="">Todos Departamentos</option>
                <option value="Producao">Produção</option>
                <option value="Cozinha">Cozinha</option>
                <option value="Escritorio">Escritório</option>
                <option value="VIPSOFT">VIPSOFT</option>
                <option value="Estoque">Estoque</option>
                <option value="Ferramentaria">Ferramentaria</option>
                <option value="Geral">Geral</option>
            </select>
            <button onclick="showUploadForm()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">+ Novo Agendamento</button>
        </div>

        <div id="list-view" class="bg-white rounded-xl shadow-lg overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Título</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Departamento</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Agendamento</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Ações</th>
                    </tr>
                </thead>
                <tbody id="media-table-body" class="divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </div>

    <div id="modal-form" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-2xl w-full">
            <h2 id="modal-title" class="text-2xl font-bold mb-6 text-indigo-700">Novo Agendamento</h2>
            <form id="upload-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" id="edit-id">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium">Título</label>
                    <input type="text" id="form-titulo" required class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium">Departamento</label>
                    <select id="form-dep" class="w-full px-4 py-2 border rounded-lg">
                        <option value="Producao">Produção</option>
                        <option value="Cozinha">Cozinha</option>
                        <option value="Escritorio">Escritório</option>
                        <option value="VIPSOFT">VIPSOFT</option>
                        <option value="Estoque">Estoque</option>
                        <option value="Ferramentaria">Ferramentaria</option>
                        <option value="Geral">Geral</option>
                    </select>
                </div>
                <div id="file-input-container">
                    <label class="block text-sm font-medium">Arquivo</label>
                    <input type="file" id="form-file" class="text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium">Início</label>
                    <input type="datetime-local" id="form-inicio" required class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium">Fim</label>
                    <input type="datetime-local" id="form-fim" required class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div class="md:col-span-2 flex justify-end space-x-3 mt-4">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded-lg">Cancelar</button>
                    <button type="submit" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = '/api'; // Na Vercel usamos o path relativo
        let token = localStorage.getItem('adminToken');
        let allMedia = [];

        // --- AUTH ---
        if (!token) {
            document.getElementById('login-container').classList.remove('hidden');
        } else {
            initDashboard();
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('adminToken', data.token);
                    location.reload();
                } else {
                    throw new Error(data.msg || 'Erro no login');
                }
            } catch (err) {
                const errDiv = document.getElementById('login-error');
                errDiv.innerText = err.message;
                errDiv.classList.remove('hidden');
            }
        };

        function logout() {
            localStorage.removeItem('adminToken');
            location.reload();
        }

        // --- DASHBOARD LOGIC ---
        async function initDashboard() {
            document.getElementById('main-container').classList.remove('hidden');
            fetchMedia();
        }

        async function fetchMedia() {
            const res = await fetch(`${API_URL}/media`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401) return logout();
            allMedia = await res.json();
            renderTable(allMedia);
        }

        function renderTable(data) {
            const tbody = document.getElementById('media-table-body');
            tbody.innerHTML = data.map(m => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-medium text-gray-900">${m.titulo}</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 bg-indigo-100 text-indigo-800 text-xs rounded-full">${m.departamento}</span></td>
                    <td class="px-6 py-4 text-xs text-gray-500">
                        Início: ${new Date(m.data_inicio).toLocaleString()}<br>
                        Fim: ${new Date(m.data_fim).toLocaleString()}
                    </td>
                    <td class="px-6 py-4 text-right space-x-2">
                        <button onclick='editMedia(${JSON.stringify(m)})' class="text-indigo-600 hover:underline">Editar</button>
                        <button onclick="deleteMedia('${m._id}')" class="text-red-600 hover:underline">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }

        // --- FILTROS ---
        document.getElementById('search').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            renderTable(allMedia.filter(m => m.titulo.toLowerCase().includes(val)));
        };

        document.getElementById('filter-dep').onchange = (e) => {
            const val = e.target.value;
            renderTable(val ? allMedia.filter(m => m.departamento === val) : allMedia);
        };

        // --- FORM ACTIONS ---
        function showUploadForm() {
            document.getElementById('modal-form').classList.remove('hidden');
            document.getElementById('upload-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('file-input-container').classList.remove('hidden');
            document.getElementById('modal-title').innerText = "Novo Agendamento";
        }

        function closeModal() {
            document.getElementById('modal-form').classList.add('hidden');
        }

        window.editMedia = function(media) {
            showUploadForm();
            document.getElementById('modal-title').innerText = "Editar: " + media.titulo;
            document.getElementById('edit-id').value = media._id;
            document.getElementById('form-titulo').value = media.titulo;
            document.getElementById('form-dep').value = media.departamento;
            document.getElementById('form-inicio').value = new Date(media.data_inicio).toISOString().slice(0, 16);
            document.getElementById('form-fim').value = new Date(media.data_fim).toISOString().slice(0, 16);
            document.getElementById('file-input-container').classList.add('hidden'); // Não edita arquivo no seu backend atual
        }

        document.getElementById('upload-form').onsubmit = async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const method = editId ? 'PUT' : 'POST';
            const url = editId ? `${API_URL}/media/${editId}` : `${API_URL}/media`;
            
            let body;
            let headers = { 'Authorization': `Bearer ${token}` };

            if (!editId) {
                body = new FormData();
                body.append('titulo', document.getElementById('form-titulo').value);
                body.append('departamento', document.getElementById('form-dep').value);
                body.append('data_inicio', new Date(document.getElementById('form-inicio').value).toISOString());
                body.append('data_fim', new Date(document.getElementById('form-fim').value).toISOString());
                body.append('file', document.getElementById('form-file').files[0]);
                body.append('ativo', true);
            } else {
                headers['Content-Type'] = 'application/json';
                body = JSON.stringify({
                    titulo: document.getElementById('form-titulo').value,
                    departamento: document.getElementById('form-dep').value,
                    data_inicio: new Date(document.getElementById('form-inicio').value).toISOString(),
                    data_fim: new Date(document.getElementById('form-fim').value).toISOString(),
                    ativo: true
                });
            }

            try {
                const res = await fetch(url, { method, headers, body });
                if (res.ok) {
                    closeModal();
                    fetchMedia();
                } else {
                    alert('Erro ao salvar mídia');
                }
            } catch (err) { alert(err.message); }
        };

        window.deleteMedia = async (id) => {
            if (!confirm('Excluir esta mídia permanentemente?')) return;
            await fetch(`${API_URL}/media/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            fetchMedia();
        };
    </script>
</body>
</html>
