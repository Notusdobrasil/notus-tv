<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Indoor Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Define a fonte e garante que o corpo ocupe toda a tela */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Remove barras de rolagem */
            background-color: #1f2937; /* Fundo cinza escuro */
        }
        /* O contêiner de mídia deve centralizar e preencher a tela */
        #media-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: relative;
        }
        /* Estilos base para a mídia */
        .media-element {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Garante que a mídia seja visível, sem cortes */
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 1;
        }
        .media-element.active {
            opacity: 1;
            z-index: 2;
        }
        .media-element.video {
            object-fit: cover; /* Vídeos geralmente ficam melhores cobrindo a tela */
        }
        
        /* Estilo para a tela de status/erro */
        #status-overlay {
            z-index: 100;
            background-color: rgba(31, 41, 55, 0.95); /* Fundo com pouca transparência */
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div id="media-container">
        </div>

    <div id="status-overlay" class="fixed inset-0 flex flex-col justify-center items-center text-center p-8 transition-opacity duration-500">
        <svg id="status-icon" class="animate-spin w-12 h-12 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <h2 id="status-title" class="text-2xl font-bold">Aguardando Configuração</h2>
        <p id="status-details" class="text-gray-400 mt-2">Tentando buscar playlist...</p>
        <p class="text-xs text-gray-500 mt-4">Chave do Player: <span id="department-key-display">N/A</span></p>
    </div>

   <script>
    // --- CONFIGURAÇÃO DE REDE (FIXA PARA A VERCEL) ---
    // ⚠️ IMPORTANTE: MUDE O LINK ABAIXO PARA O ENDEREÇO DO SEU SERVIDOR/BACKEND
    // Exemplo local: "http://192.168.0.10:3001"
    // Exemplo online: "https://meu-backend-api.com"
    const BACKEND_URL = "display_player.html?departamento=Producao"; 

    // Base da API construída a partir do BACKEND_URL
    const API_BASE_URL = `${BACKEND_URL}/api/display/playlist`;

    const REFRESH_INTERVAL_MS = 300000; // Recarrega a playlist a cada 5 minutos
    const DEFAULT_IMAGE_DURATION_MS = 7000; // 7s para imagens
    
    const container = document.getElementById('media-container');
    const statusOverlay = document.getElementById('status-overlay');
    const statusTitle = document.getElementById('status-title');
    const statusDetails = document.getElementById('status-details');
    const departmentKeyDisplay = document.getElementById('department-key-display');
    
    let currentPlaylist = [];
    let playlistIndex = 0;
    let department = null;
    let isPlaying = false;
    let intervalId = null;
    let currentElement = null;

    // Usa sempre o host do Backend para buscar as imagens/vídeos
    function getServerBaseUrl() {
        return BACKEND_URL;
    }
    
    // --- Funções Auxiliares de Status ---

    function updateStatus(title, details, isError = false) {
        statusOverlay.classList.remove('hidden');
        statusTitle.textContent = title;
        statusDetails.textContent = details;
        
        const icon = document.getElementById('status-icon');
        if (icon) {
            icon.classList.remove('animate-spin', 'text-blue-500', 'text-red-500', 'text-yellow-500');
            if (isError) {
                icon.classList.add('text-red-500');
                // Ícone de erro (X)
                icon.innerHTML = '<path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>';
            } else {
                icon.classList.add('animate-spin', 'text-blue-500');
                // Ícone de loading (Spinner)
                icon.innerHTML = '<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>';
            }
        }
    }

    function hideStatus() {
        statusOverlay.classList.add('hidden');
    }

    function getDepartmentFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('departamento');
    }

    // Função principal para buscar a playlist
    async function fetchPlaylist() {
        if (!department) return;
        
        const fullUrl = `${API_BASE_URL}/${department}`;
        updateStatus("Buscando Playlist...", `Conectando a: ${fullUrl}`);
        
        try {
            let response = null;
            const maxRetries = 3;
            let delay = 1000; 

            for (let i = 0; i < maxRetries; i++) {
                try {
                    // Timeout de 7s
                    response = await fetch(fullUrl, { signal: AbortSignal.timeout(7000) }); 
                    if (response.ok) break; 
                } catch (e) {
                    if (i < maxRetries - 1) {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2; 
                    } else {
                        throw new Error("Falha de rede após várias retentativas (Timeout ou Servidor offline).");
                    }
                }
            }

            if (!response || !response.ok) {
                const errorText = response ? await response.text() : "Sem resposta do servidor.";
                throw new Error(`Erro HTTP ${response?.status || 'N/A'}: ${errorText.substring(0, 50)}...`);
            }

            const data = await response.json();
            
            const playlistData = data.playlist || data; 

            if (playlistData && Array.isArray(playlistData) && playlistData.length > 0) {
                const oldPlaylistLength = currentPlaylist.length;
                currentPlaylist = playlistData;
                
                if (oldPlaylistLength !== currentPlaylist.length || playlistIndex >= currentPlaylist.length) {
                    playlistIndex = playlistIndex % currentPlaylist.length; 
                }
                
                if (!isPlaying) {
                    isPlaying = true;
                    startPlayback();
                } 
                hideStatus(); 
            } else {
                currentPlaylist = [];
                stopPlayback();
                updateStatus("Aguardando Mídia", `Nenhuma mídia agendada para o departamento de ${department}. Tentando novamente em 5 minutos...`, false);
            }
        } catch (error) {
            console.error("ERRO CRÍTICO ao buscar playlist (Network/Server):", error);
            stopPlayback();
            updateStatus("ERRO DE CONEXÃO/API", 
                `Falha ao conectar no Backend (${BACKEND_URL}). Mensagem: ${error.message}`, 
                true
            );
        }
    }

    function createMediaElement(media) {
        let element;
        
        const mediaUrl = getServerBaseUrl() + (media.url_midia.startsWith('/') ? media.url_midia : '/' + media.url_midia);
        
        if (media.tipo_arquivo === 'video') {
            element = document.createElement('video');
            element.className = 'media-element video';
            element.autoplay = true;
            element.muted = true; 
            element.playsInline = true; 
            element.loop = false;
            element.src = mediaUrl; 
            element.volume = 0; 

            element.onloadedmetadata = () => {
                if (element.paused) {
                    element.play().catch(error => {
                        setTimeout(playNext, DEFAULT_IMAGE_DURATION_MS); 
                    });
                }
            };
            
            element.onended = playNext;
            
            element.onerror = (e) => {
                console.error("ERRO CRÍTICO: Falha ao carregar/reproduzir o recurso de vídeo.", mediaUrl, e);
                setTimeout(playNext, 100); 
            };
        } else { 
            element = document.createElement('img');
            element.className = 'media-element';
            element.src = mediaUrl; 
            
            element.onerror = (e) => {
                console.error("Erro ao carregar imagem:", mediaUrl, e);
                playNext();
            };
        }
        
        return element;
    }

    function playCurrent() {
        if (currentPlaylist.length === 0) return;

        const media = currentPlaylist[playlistIndex % currentPlaylist.length];
        const newElement = createMediaElement(media);
        
        if (currentElement) {
            currentElement.classList.remove('active');
            
            const elementToRemove = currentElement;
            setTimeout(() => {
                if(elementToRemove && elementToRemove.parentNode === container) {
                    container.removeChild(elementToRemove);
                }
            }, 1000); 
        }
        
        container.appendChild(newElement);
        currentElement = newElement;

        setTimeout(() => {
            currentElement.classList.add('active');

            if (media.tipo_arquivo === 'video' && currentElement.paused) {
                currentElement.load(); 
                currentElement.play().catch(error => {
                    console.warn("AVISO: Autoplay bloqueado na ativação.");
                });
            }
        }, 50); 
        
        if (media.tipo_arquivo !== 'video') {
            const duration = media.custom_duration_ms || DEFAULT_IMAGE_DURATION_MS;
            setTimeout(playNext, duration);
        }
    }

    function playNext() {
        if (!isPlaying || currentPlaylist.length === 0) return;
        playlistIndex = (playlistIndex + 1) % currentPlaylist.length;
        playCurrent();
    }

    function startPlayback() {
        if (intervalId) clearInterval(intervalId);
        playCurrent();
        intervalId = setInterval(fetchPlaylist, REFRESH_INTERVAL_MS);
    }

    function stopPlayback() {
        isPlaying = false;
        if (currentElement) {
            if (currentElement.tagName === 'VIDEO') {
                currentElement.pause();
            }
            if (currentElement.parentNode === container) {
                container.removeChild(currentElement);
            }
        }
        currentElement = null;
        if (intervalId) clearInterval(intervalId);
        intervalId = null;
    }

    // --- Inicialização da Aplicação ---
    window.onload = () => {
        department = getDepartmentFromURL();
        departmentKeyDisplay.textContent = department || 'NÃO DEFINIDO';

        if (!department) {
            updateStatus("ERRO DE CONFIGURAÇÃO", 
                `Por favor, defina o departamento na URL. Ex: display_player.html?departamento=Producao`, 
                true
            );
            return;
        }

        fetchPlaylist();
    };
</script>
</body>
</html>
