<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Indoor Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #1f2937;
        }
        #media-container {
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
            position: relative;
        }
        .media-element {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 1;
        }
        .media-element.active { opacity: 1; z-index: 2; }
        .media-element.video { object-fit: cover; }
        #status-overlay {
            z-index: 100;
            background-color: rgba(31, 41, 55, 0.95);
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div id="media-container"></div>

    <div id="status-overlay" class="fixed inset-0 flex flex-col justify-center items-center text-center p-8 transition-opacity duration-500">
        <svg id="status-icon" class="animate-spin w-12 h-12 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <h2 id="status-title" class="text-2xl font-bold">Iniciando...</h2>
        <p id="status-details" class="text-gray-400 mt-2">Conectando ao sistema Notus TV</p>
        <p class="text-xs text-gray-500 mt-4">ID do Player: <span id="department-key-display">N/A</span></p>
    </div>

<script>
    // --- AJUSTE PARA VERCEL ---
    // Removemos a porta fixa 3001, pois na Vercel o acesso é direto pelo domínio
    const BASE_URL = window.location.origin;
    const API_BASE_URL = `${BASE_URL}/api/display/playlist`;

    const REFRESH_INTERVAL_MS = 300000; 
    const DEFAULT_IMAGE_DURATION_MS = 7000; 
    
    // ... restante das suas variáveis (container, statusOverlay, etc) ...

    async function fetchPlaylist() {
        if (!department) return;
        
        // Aqui garantimos que a URL não use porta 3001 se estivermos na Vercel
        const fullUrl = `${API_BASE_URL}/${department}`;
        updateStatus("Buscando Playlist...", `Conectando a: ${fullUrl}`);
        
        try {
            // Mantive sua lógica de retentativas intacta
            let response = null;
            const maxRetries = 3;
            let delay = 1000; 

            for (let i = 0; i < maxRetries; i++) {
                try {
                    response = await fetch(fullUrl, { signal: AbortSignal.timeout(7000) }); 
                    if (response.ok) break; 
                } catch (e) {
                    if (i < maxRetries - 1) {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2; 
                    } else {
                        throw new Error("Falha de rede (Servidor offline na Vercel).");
                    }
                }
            }

            if (!response || !response.ok) {
                throw new Error(`Erro HTTP ${response?.status || 'N/A'}`);
            }

            const data = await response.json();
            const playlistData = data.playlist || data; 

            if (playlistData && Array.isArray(playlistData) && playlistData.length > 0) {
                currentPlaylist = playlistData;
                if (!isPlaying) {
                    isPlaying = true;
                    startPlayback();
                } 
                hideStatus(); 
            } else {
                updateStatus("Aguardando Mídia", `Sem mídia para ${department}`);
            }
        } catch (error) {
            updateStatus("ERRO DE CONEXÃO", `Verifique se o backend está rodando na Vercel. Detalhe: ${error.message}`, true);
        }
    }

    // Na função de criar elemento, garanta que a URL da mídia use o BASE_URL correto
    function createMediaElement(media) {
        let element;
        const mediaUrl = media.url_midia.startsWith('http') 
            ? media.url_midia 
            : BASE_URL + (media.url_midia.startsWith('/') ? media.url_midia : '/' + media.url_midia);
        
        // ... restante da sua função createMediaElement ...
    }
</script>
</body>
</html>
