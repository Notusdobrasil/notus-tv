<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Indoor Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #1f2937;
        }
        #media-container {
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
            position: relative;
        }
        .media-element {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 1;
        }
        .media-element.active { opacity: 1; z-index: 2; }
        .media-element.video { object-fit: cover; }
        #status-overlay { z-index: 100; background-color: rgba(31, 41, 55, 0.95); }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div id="media-container"></div>

    <div id="status-overlay" class="fixed inset-0 flex flex-col justify-center items-center text-center p-8 transition-opacity duration-500">
        <svg id="status-icon" class="animate-spin w-12 h-12 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <h2 id="status-title" class="text-2xl font-bold">Iniciando...</h2>
        <p id="status-details" class="text-gray-400 mt-2">Conectando ao servidor Vercel</p>
        <p class="text-xs text-gray-500 mt-4">Chave do Player: <span id="department-key-display">N/A</span></p>
    </div>

<script>
    // --- CONFIGURAÇÃO VERCEL (SEM PORTAS) ---
    const API_BASE_URL = `${window.location.origin}/api/display/playlist`;
    const REFRESH_INTERVAL_MS = 300000; 
    const DEFAULT_IMAGE_DURATION_MS = 7000; 
    
    const container = document.getElementById('media-container');
    const statusOverlay = document.getElementById('status-overlay');
    const statusTitle = document.getElementById('status-title');
    const statusDetails = document.getElementById('status-details');
    const departmentKeyDisplay = document.getElementById('department-key-display');
    
    let currentPlaylist = [];
    let playlistIndex = 0;
    let department = null;
    let isPlaying = false;
    let intervalId = null;
    let currentElement = null;

    function updateStatus(title, details, isError = false) {
        statusOverlay.classList.remove('hidden');
        statusTitle.textContent = title;
        statusDetails.textContent = details;
        const icon = document.getElementById('status-icon');
        if (icon) {
            icon.classList.remove('animate-spin', 'text-blue-500', 'text-red-500');
            if (isError) {
                icon.classList.add('text-red-500');
                icon.innerHTML = '<path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>';
            } else {
                icon.classList.add('animate-spin', 'text-blue-500');
                icon.innerHTML = '<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>';
            }
        }
    }

    function hideStatus() { statusOverlay.classList.add('hidden'); }

    async function fetchPlaylist() {
        department = new URLSearchParams(window.location.search).get('departamento');
        departmentKeyDisplay.textContent = department || 'ERRO';

        if (!department) {
            updateStatus("ERRO", "Adicione ?departamento=NOME na URL", true);
            return;
        }
        
        const fullUrl = `${API_BASE_URL}/${department}`;
        
        try {
            let response = await fetch(fullUrl, { signal: AbortSignal.timeout(10000) });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const data = await response.json();
            const playlistData = Array.isArray(data) ? data : (data.playlist || []);

            if (playlistData.length > 0) {
                currentPlaylist = playlistData;
                if (!isPlaying) {
                    isPlaying = true;
                    startPlayback();
                } 
                hideStatus(); 
            } else {
                updateStatus("Sem Mídia", `Nenhum item para ${department}`, false);
            }
        } catch (error) {
            updateStatus("ERRO DE CONEXÃO", `Falha ao ler API na Vercel: ${error.message}`, true);
        }
    }

    function createMediaElement(media) {
        let element;
        const mediaUrl = media.url_midia.startsWith('http') 
            ? media.url_midia 
            : window.location.origin + (media.url_midia.startsWith('/') ? media.url_midia : '/' + media.url_midia);
        
        if (media.tipo_arquivo === 'video') {
            element = document.createElement('video');
            element.className = 'media-element video';
            element.autoplay = true; element.muted = true; element.playsInline = true;
            element.src = mediaUrl;
            element.onended = playNext;
            element.onerror = () => setTimeout(playNext, 1000);
        } else { 
            element = document.createElement('img');
            element.className = 'media-element';
            element.src = mediaUrl;
            element.onerror = () => playNext();
            const duration = media.custom_duration_ms || DEFAULT_IMAGE_DURATION_MS;
            setTimeout(playNext, duration);
        }
        return element;
    }

    function playCurrent() {
        if (currentPlaylist.length === 0) return;
        const media = currentPlaylist[playlistIndex % currentPlaylist.length];
        const newElement = createMediaElement(media);
        
        if (currentElement) {
            currentElement.classList.remove('active');
            const toRemove = currentElement;
            setTimeout(() => { if(toRemove.parentNode) container.removeChild(toRemove); }, 1000);
        }
        
        container.appendChild(newElement);
        currentElement = newElement;
        setTimeout(() => currentElement.classList.add('active'), 50);
    }

    function playNext() {
        if (!isPlaying || currentPlaylist.length === 0) return;
        playlistIndex = (playlistIndex + 1) % currentPlaylist.length;
        playCurrent();
    }

    function startPlayback() {
        playCurrent();
        if (intervalId) clearInterval(intervalId);
        intervalId = setInterval(fetchPlaylist, REFRESH_INTERVAL_MS);
    }

    window.onload = fetchPlaylist;
</script>
</body>
</html>
