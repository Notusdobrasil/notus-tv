<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração de Mídia Indoor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="login-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-80 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md">
            <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">Login do Painel</h2>
            <p id="login-error" class="mb-4 text-center text-sm font-medium text-red-600 hidden">Credenciais inválidas.</p>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">E-mail</label>
                    <input type="email" id="login-email" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Senha</label>
                    <input type="password" id="login-password" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                </div>
                <button type="submit" id="login-button" class="w-full py-2 px-4 rounded-md text-white bg-indigo-600 hover:bg-indigo-700 font-semibold">Entrar</button>
            </form>
        </div>
    </div>

    <div id="app-container" class="hidden min-h-screen p-4 sm:p-8">
        <div class="max-w-7xl mx-auto">
            <header class="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-extrabold text-gray-800 border-b pb-2">Gestão de Mídia Indoor</h1>
                    <p class="text-gray-500 mt-1 text-sm">Suporte: Google Drive & Dropbox</p>
                </div>
                <div class="flex items-center gap-3">
                    <span id="user-info" class="text-sm text-gray-600"></span>
                    <button id="logout-button" class="py-1 px-3 rounded-md text-sm text-white bg-red-600 hover:bg-red-700">Sair</button>
                </div>
            </header>

            <section class="bg-white p-6 rounded-lg shadow-xl mb-8 border-t-4 border-indigo-500">
                <h2 class="text-xl font-semibold text-gray-700 mb-4 border-b pb-2">1. Adicionar Nova Mídia</h2>
                
                <form id="create-form" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Título/Descrição</label>
                            <input type="text" id="titulo" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Departamento</label>
                            <select id="departamento" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                                <option value="">Selecione...</option>
                                <option value="Producao">Produção</option>
                                <option value="Cozinha">Cozinha</option>
                                <option value="Escritorio">Escritório</option>
                                <option value="VIPSOFT">VIPSOFT</option>
                                <option value="Estoque">Estoque</option>
                                <option value="Ferramentaria">Ferramentaria</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Início da Exibição</label>
                            <input type="datetime-local" id="data_inicio" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Fim da Exibição</label>
                            <input type="datetime-local" id="data_fim" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Tipo</label>
                            <select id="tipo_arquivo" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                                <option value="imagem">Imagem</option>
                                <option value="video">Vídeo</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-indigo-600 font-bold">Link da Mídia (Dropbox ou Drive)</label>
                            <input type="text" id="url_midia" required placeholder="Cole o link aqui" class="mt-1 block w-full border-2 border-indigo-200 rounded-md shadow-sm p-2 bg-indigo-50">
                            <p class="text-[10px] text-gray-500 mt-1">Dica: No Dropbox, use o link que termina em dl=0. O sistema ajustará.</p>
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit" id="submit-button" class="w-full py-3 px-4 rounded-md text-white bg-green-600 hover:bg-green-700 font-bold transition shadow-lg">
                            Salvar na Playlist
                        </button>
                    </div>
                </form>
            </section>

            <section class="bg-white p-6 rounded-lg shadow-xl">
                <h2 class="text-xl font-semibold text-gray-700 mb-4 border-b pb-2">2. Mídias Agendadas</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">Título</th>
                                <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">Depto</th>
                                <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">Período</th>
                                <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="media-table-body" class="bg-white divide-y divide-gray-200 text-sm"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';
        const PLAYLIST_API_URL = `${API_BASE_URL}/admin/playlist`;

        // --- FUNÇÃO HÍBRIDA: CORRIGE DRIVE E DROPBOX ---
        function formatMediaUrl(url, tipo) {
            // Lógica para DROPBOX
            if (url.includes('dropbox.com')) {
                // Substitui qualquer final dl=0 ou dl=1 por raw=1 (Link Direto)
                return url.replace(/dl=[01]/, 'raw=1');
            }

            // Lógica para GOOGLE DRIVE
            if (url.includes('drive.google.com')) {
                const match = url.match(/\/d\/(.+?)\/|id=(.+?)(&|$)/);
                const id = match ? (match[1] || match[2]) : null;
                if (id) {
                    if (tipo === 'video') {
                        return `https://drive.google.com/uc?export=download&id=${id}`;
                    }
                    // Imagem via Thumbnail (mais estável)
                    return `https://drive.google.com/thumbnail?authuser=0&sz=w1920&id=${id}`;
                }
            }
            return url;
        }

        const loginOverlay = document.getElementById('login-overlay');
        const loginForm = document.getElementById('login-form');
        const appContainer = document.getElementById('app-container');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const resp = await fetch(`${API_BASE_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (resp.ok) {
                location.reload();
            } else {
                alert('Erro no login. Verifique e-mail e senha.');
            }
        });

        document.getElementById('logout-button').onclick = () => {
            document.cookie = "connect.sid=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            location.reload();
        };

        const departments = ['Producao', 'Cozinha', 'Escritorio', 'VIPSOFT', 'Estoque', 'Ferramentaria'];

        async function loadPlaylists() {
            const tableBody = document.getElementById('media-table-body');
            tableBody.innerHTML = '';

            for (const dept of departments) {
                try {
                    const resp = await fetch(`${PLAYLIST_API_URL}/${dept}`);
                    if (!resp.ok) continue;
                    const items = await resp.json();

                    items.forEach((item, index) => {
                        const row = `<tr>
                            <td class="px-3 py-4 font-medium">${item.titulo}</td>
                            <td class="px-3 py-4 text-gray-500">${dept}</td>
                            <td class="px-3 py-4 text-[11px]">
                                ${new Date(item.data_inicio).toLocaleString()} até<br>
                                ${new Date(item.data_fim).toLocaleString()}
                            </td>
                            <td class="px-3 py-4">
                                <button onclick="deleteItem('${dept}', ${index})" class="text-red-600 font-bold hover:underline">Excluir</button>
                            </td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    });
                } catch (e) {}
            }
        }

        document.getElementById('create-form').onsubmit = async (e) => {
            e.preventDefault();
            const dept = document.getElementById('departamento').value;
            const tipo = document.getElementById('tipo_arquivo').value;
            const rawUrl = document.getElementById('url_midia').value;
            
            // Agora usa a função híbrida
            const fixedUrl = formatMediaUrl(rawUrl, tipo);

            const newItem = {
                titulo: document.getElementById('titulo').value,
                data_inicio: new Date(document.getElementById('data_inicio').value).toISOString(),
                data_fim: new Date(document.getElementById('data_fim').value).toISOString(),
                tipo_arquivo: tipo,
                url_midia: fixedUrl,
                ativo: true
            };

            const getResp = await fetch(`${PLAYLIST_API_URL}/${dept}`);
            const currentList = getResp.ok ? await getResp.json() : [];
            currentList.push(newItem);

            const saveResp = await fetch(`${PLAYLIST_API_URL}/${dept}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(currentList)
            });

            if (saveResp.ok) {
                alert('Mídia salva e convertida com sucesso!');
                loadPlaylists();
                e.target.reset();
            }
        };

        window.deleteItem = async (dept, index) => {
            if (!confirm('Deseja excluir esta mídia?')) return;
            const getResp = await fetch(`${PLAYLIST_API_URL}/${dept}`);
            const list = await getResp.json();
            list.splice(index, 1);

            await fetch(`${PLAYLIST_API_URL}/${dept}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(list)
            });
            loadPlaylists();
        };

        fetch(`${API_BASE_URL}/auth/me`).then(r => {
            if(r.ok) {
                loginOverlay.classList.add('hidden');
                appContainer.classList.remove('hidden');
                loadPlaylists();
            }
        });

    </script>
</body>
</html>
