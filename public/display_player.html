<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Indoor Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #000;
        }
        #media-container {
            width: 100%; height: 100%;
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }
        .media-element {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .media-element.active { opacity: 1; z-index: 10; }
        #status-overlay { z-index: 100; background: #111; }
    </style>
</head>
<body>

    <div id="media-container"></div>

    <div id="status-overlay" class="fixed inset-0 flex flex-col justify-center items-center text-center p-8">
        <div id="status-icon" class="animate-spin mb-4 w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full"></div>
        <h2 id="status-title" class="text-2xl font-bold text-white">Iniciando Player...</h2>
        <p id="status-details" class="text-gray-400 mt-2">Buscando configurações da rede</p>
        <p class="text-xs text-gray-500 mt-4">Departamento: <span id="dept-display">---</span></p>
    </div>

    <script>
        const container = document.getElementById('media-container');
        const overlay = document.getElementById('status-overlay');
        const statusTitle = document.getElementById('status-title');
        const statusDetails = document.getElementById('status-details');
        const deptDisplay = document.getElementById('dept-display');

        let currentPlaylist = [];
        let currentIndex = 0;
        let isPlaying = false;

        // Configuração da API
        const API_URL = '/api/display/playlist';

        function updateStatus(title, details) {
            statusTitle.textContent = title;
            statusDetails.textContent = details;
        }

        async function fetchPlaylist() {
            const params = new URLSearchParams(window.location.search);
            const dept = params.get('departamento');

            if (!dept) {
                updateStatus("ERRO", "Adicione ?departamento=NOME no final da URL");
                return;
            }
            deptDisplay.textContent = dept;

            try {
                const response = await fetch(`${API_URL}/${dept}`);
                if (!response.ok) throw new Error("Erro na rede");
                
                const data = await response.json();
                
                if (Array.isArray(data) && data.length > 0) {
                    currentPlaylist = data;
                    overlay.style.display = 'none';
                    if (!isPlaying) startPlayback();
                } else {
                    overlay.style.display = 'flex';
                    updateStatus("Sem Mídia", `Nenhuma mídia ativa para ${dept}`);
                }
            } catch (error) {
                updateStatus("Erro de Conexão", "Tentando reconectar...");
            }
        }

        function startPlayback() {
            if (currentPlaylist.length === 0) return;
            isPlaying = true;
            showMedia();
        }

        function showMedia() {
            const item = currentPlaylist[currentIndex];
            container.innerHTML = ''; // Limpa anterior

            let el;
            if (item.tipo_arquivo === 'video') {
                el = document.createElement('video');
                el.src = item.url_midia;
                el.autoplay = true;
                el.muted = true; // Necessário para autoplay no Chrome
                el.onended = next;
            } else {
                el = document.createElement('img');
                el.src = item.url_midia;
                setTimeout(next, 7000); // 7 segundos para fotos
            }

            el.className = 'media-element active';
            container.appendChild(el);
        }

        function next() {
            currentIndex = (currentIndex + 1) % currentPlaylist.length;
            showMedia();
        }

        // Loop de atualização (checa novas mídias a cada 1 minuto)
        setInterval(fetchPlaylist, 60000);
        fetchPlaylist();

    </script>
</body>
</html>
