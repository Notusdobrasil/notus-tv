<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Indoor Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #000;
        }
        #media-container {
            width: 100%; height: 100%;
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }
        .media-element {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain; /* Ou cover, dependendo da sua preferência */
            display: none;
        }
        .media-element.active { display: block; }
        #status-overlay { z-index: 100; background: #111; }
    </style>
</head>
<body>

    <div id="media-container"></div>

    <div id="status-overlay" class="fixed inset-0 flex flex-col justify-center items-center text-center p-8">
        <div id="status-icon" class="animate-spin mb-4 w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full"></div>
        <h2 id="status-title" class="text-2xl font-bold text-white">Iniciando Player...</h2>
        <p id="status-details" class="text-gray-400 mt-2">Buscando configurações da rede</p>
        <p class="text-xs text-gray-500 mt-4">Departamento: <span id="dept-display">---</span></p>
    </div>

    <script>
        const container = document.getElementById('media-container');
        const overlay = document.getElementById('status-overlay');
        const statusTitle = document.getElementById('status-title');
        const statusDetails = document.getElementById('status-details');
        const deptDisplay = document.getElementById('dept-display');

        let currentPlaylist = [];
        let currentIndex = 0;
        let isPlaying = false;
        let timer = null;

        const API_URL = '/api/display/playlist';

        function updateStatus(title, details) {
            statusTitle.textContent = title;
            statusDetails.textContent = details;
        }

        async function fetchPlaylist() {
            const params = new URLSearchParams(window.location.search);
            const dept = params.get('departamento');

            if (!dept) {
                updateStatus("ERRO", "Adicione ?departamento=NOME na URL");
                return;
            }
            deptDisplay.textContent = dept;

            try {
                const response = await fetch(`${API_URL}/${dept}?t=${Date.now()}`);
                if (!response.ok) throw new Error("Erro na rede");
                
                const data = await response.json();
                
                if (Array.isArray(data) && data.length > 0) {
                    // Se a playlist mudou ou é a primeira vez
                    if (JSON.stringify(data) !== JSON.stringify(currentPlaylist)) {
                        currentPlaylist = data;
                        overlay.style.display = 'none';
                        if (!isPlaying) startPlayback();
                    }
                } else {
                    currentPlaylist = [];
                    overlay.style.display = 'flex';
                    updateStatus("Sem Mídia", `Nenhuma mídia ativa para ${dept}`);
                    isPlaying = false;
                }
            } catch (error) {
                console.error("Erro ao buscar playlist:", error);
            }
        }

        function startPlayback() {
            if (currentPlaylist.length === 0) return;
            isPlaying = true;
            showMedia();
        }

        function showMedia() {
            if (timer) clearTimeout(timer);
            if (currentPlaylist.length === 0) return;

            const item = currentPlaylist[currentIndex];
            container.innerHTML = ''; 

            let el;
            if (item.tipo_arquivo === 'video') {
                el = document.createElement('video');
                el.src = item.url_midia;
                el.autoplay = true;
                el.muted = true;
                el.playsInline = true;
                el.style.backgroundColor = "black";
                el.onended = next;
                el.onerror = () => { console.error("Erro no vídeo"); next(); };
            } else {
                el = document.createElement('img');
                // IMPORTANTE: Adiciona política de referenciamento para Dropbox/Drive
                el.referrerPolicy = "no-referrer";
                el.src = item.url_midia;
                
                el.onerror = () => {
                    console.error("Erro na imagem, pulando...");
                    setTimeout(next, 2000);
                };
                
                timer = setTimeout(next, 7000); 
            }

            el.className = 'media-element active';
            container.appendChild(el);
        }

        function next() {
            if (currentPlaylist.length === 0) return;
            currentIndex = (currentIndex + 1) % currentPlaylist.length;
            showMedia();
        }

        // Loop de verificação
        setInterval(fetchPlaylist, 30000);
        fetchPlaylist();
    </script>
</body>
</html>
