<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Notus TV - Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; color: white; font-family: sans-serif; }
        .container { display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        video, iframe { width: 100vw; height: 100vh; border: none; }
    </style>
</head>
<body>
    <div id="player-container" class="container">
        <div id="message">Carregando programação...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const dept = params.get('departamento');
        const container = document.getElementById('player-container');

        async function loadVideo() {
            if (!dept) {
                container.innerHTML = "<h1>Erro: Departamento não especificado na URL.</h1>";
                return;
            }

            try {
                const response = await fetch(`/api/playlists/${dept}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const video = data[0]; // Pega o primeiro vídeo da lista
                    if (video.url.includes('youtube.com') || video.url.includes('youtu.be')) {
                        const embedUrl = video.url.replace("watch?v=", "embed/").split("&")[0] + "?autoplay=1&mute=1";
                        container.innerHTML = `<iframe src="${embedUrl}" allow="autoplay"></iframe>`;
                    } else {
                        container.innerHTML = `<video src="${video.url}" autoplay muted loop controls></video>`;
                    }
                } else {
                    container.innerHTML = `<div><h1>Aguardando Configuração</h1><p>Departamento: ${dept}</p></div>`;
                }
            } catch (err) {
                container.innerHTML = "<h1>Erro ao conectar com a API.</h1>";
            }
        }

        loadVideo();
        setInterval(loadVideo, 30000); // Atualiza a cada 30 segundos
    </script>
</body>
</html>
