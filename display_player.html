<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Indoor Display</title>
    <!-- Carrega o Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Define a fonte e garante que o corpo ocupe toda a tela */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Remove barras de rolagem */
            background-color: #1f2937; /* Fundo cinza escuro */
        }
        /* O contêiner de mídia deve centralizar e preencher a tela */
        #media-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: relative;
        }
        /* Estilos base para a mídia */
        .media-element {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Garante que a mídia seja visível, sem cortes */
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 1;
        }
        .media-element.active {
            opacity: 1;
            z-index: 2;
        }
        .media-element.video {
            object-fit: cover; /* Vídeos geralmente ficam melhores cobrindo a tela */
        }
        
        /* Estilo para a tela de status/erro */
        #status-overlay {
            z-index: 100;
            background-color: rgba(31, 41, 55, 0.95); /* Fundo com pouca transparência */
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div id="media-container">
        <!-- Elementos de Mídia (serão adicionados pelo JS) -->
    </div>

    <!-- TELA DE STATUS/ERRO -->
    <div id="status-overlay" class="fixed inset-0 flex flex-col justify-center items-center text-center p-8 transition-opacity duration-500">
        <svg id="status-icon" class="animate-spin w-12 h-12 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <h2 id="status-title" class="text-2xl font-bold">Aguardando Configuração</h2>
        <p id="status-details" class="text-gray-400 mt-2">Tentando buscar playlist...</p>
        <p class="text-xs text-gray-500 mt-4">Chave do Player: <span id="department-key-display">N/A</span></p>
    </div>

   <script>
    // --- CONFIGURAÇÃO DE REDE (CORRIGIDA PARA VERCEL) ---
    // Na Vercel, não usamos porta 3001. Usamos o domínio atual via HTTPS.
    const API_BASE_URL = `${window.location.origin}/api/display/playlist`;

    const REFRESH_INTERVAL_MS = 300000; // 5 minutos
    const DEFAULT_IMAGE_DURATION_MS = 7000; 
    
    const container = document.getElementById('media-container');
    const statusOverlay = document.getElementById('status-overlay');
    const statusTitle = document.getElementById('status-title');
    const statusDetails = document.getElementById('status-details');
    const departmentKeyDisplay = document.getElementById('department-key-display');
    
    let currentPlaylist = [];
    let playlistIndex = 0;
    let department = null;
    let isPlaying = false;
    let intervalId = null;
    let currentElement = null;

    // Função para pegar a base do servidor sem portas manuais
    function getServerBaseUrl() {
        return window.location.origin;
    }
    
    // ... (funções updateStatus e hideStatus permanecem iguais) ...

    async function fetchPlaylist() {
        if (!department) return;
        
        const fullUrl = `${API_BASE_URL}/${department}`;
        updateStatus("Buscando Playlist...", `Conectando ao Backend na Vercel...`);
        
        try {
            let response = null;
            // Tentamos a conexão. Se falhar, é erro de rota ou backend fora.
            response = await fetch(fullUrl, { 
                method: 'GET',
                headers: { 'Cache-Control': 'no-cache' }
            });

            if (!response.ok) {
                throw new Error(`Erro HTTP ${response.status}: Verifique se a pasta /api existe no GitHub.`);
            }

            const data = await response.json();
            const playlistData = Array.isArray(data) ? data : (data.playlist || []);

            if (playlistData.length > 0) {
                currentPlaylist = playlistData;
                if (!isPlaying) {
                    isPlaying = true;
                    startPlayback();
                } 
                hideStatus(); 
            } else {
                updateStatus("Aguardando Mídia", `Sem mídia para: ${department}`, false);
            }
        } catch (error) {
            console.error("Erro na API:", error);
            updateStatus("ERRO DE COMUNICAÇÃO", 
                `Não foi possível falar com o servidor. Verifique o arquivo vercel.json na raiz.`, 
                true
            );
        }
    }

    // Corrigido para carregar mídias da Vercel ou URLs externas
    function createMediaElement(media) {
        let element;
        // Se a URL for relativa, soma com o domínio da Vercel. Se for externa (http), usa ela mesma.
        const mediaUrl = media.url_midia.startsWith('http') 
            ? media.url_midia 
            : getServerBaseUrl() + (media.url_midia.startsWith('/') ? media.url_midia : '/' + media.url_midia);
        
        if (media.tipo_arquivo === 'video') {
            element = document.createElement('video');
            element.className = 'media-element video';
            element.autoplay = true;
            element.muted = true;
            element.playsInline = true;
            element.src = mediaUrl;
            element.onended = playNext;
            element.onerror = () => setTimeout(playNext, 1000);
        } else { 
            element = document.createElement('img');
            element.className = 'media-element';
            element.src = mediaUrl;
            element.onerror = () => playNext();
        }
        return element;
    }

    // ... (restante das funções playCurrent, playNext, startPlayback permanecem iguais) ...
</script>
</body>
</html>
